<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="TabiShare">
<meta name="theme-color" content="#ffffff">
<title>TabiShare</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F9FAFB;color:#111;max-width:480px;margin:0 auto;min-height:100vh;}
.screen{display:none;flex-direction:column;min-height:100vh;}
.screen.active{display:flex;}
.header{background:#fff;border-bottom:0.5px solid #E5E7EB;padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;}
.scroll{flex:1;overflow-y:auto;padding:16px;padding-bottom:80px;}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:0.5px solid #E5E7EB;display:flex;z-index:100;}
.nav-btn{flex:1;padding:8px 2px 6px;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;border-top:2px solid transparent;}
.nav-btn.active{border-top-color:#3B82F6;}
.nav-btn span{font-size:17px;}
.nav-btn small{font-size:9px;color:#9CA3AF;}
.nav-btn.active small{color:#1D4ED8;font-weight:600;}
.card{background:#fff;border-radius:12px;padding:14px;border:0.5px solid #E5E7EB;margin-bottom:10px;}
.btn-primary{background:#EFF6FF;border-radius:8px;padding:8px 14px;border:0.5px solid #BFDBFE;color:#1D4ED8;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;}
.btn-sec{background:#fff;border-radius:8px;padding:8px 14px;border:0.5px solid #D1D5DB;color:#374151;font-size:13px;cursor:pointer;}
.btn-danger{background:#FEF2F2;border-radius:8px;padding:8px 14px;border:0.5px solid #FECACA;color:#EF4444;font-size:13px;cursor:pointer;}
.btn-edit{background:#F0FDF4;border-radius:8px;padding:4px 10px;border:0.5px solid #BBF7D0;color:#166534;font-size:12px;cursor:pointer;}
.row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.chip{display:inline-flex;padding:4px 10px;border-radius:99px;border:0.5px solid #D1D5DB;font-size:12px;cursor:pointer;background:#fff;color:#6B7280;white-space:nowrap;}
.chip.active{border-width:2px;border-color:#3B82F6;background:#EFF6FF;color:#1D4ED8;font-weight:600;}
.chip-row{display:flex;gap:6px;overflow-x:auto;margin-bottom:10px;padding-bottom:4px;scrollbar-width:none;}
.chip-row::-webkit-scrollbar{display:none;}
.badge{display:inline-flex;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:500;white-space:nowrap;}
.input{width:100%;border:0.5px solid #D1D5DB;border-radius:8px;padding:10px;font-size:14px;background:#fff;margin-bottom:10px;outline:none;}
.input:focus{border-color:#3B82F6;}
textarea.input{height:70px;resize:none;}
.prog-bar{height:4px;border-radius:99px;background:#F1EFE8;overflow:hidden;margin-top:4px;}
.prog-fill{height:100%;border-radius:99px;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;align-items:flex-end;justify-content:center;}
.modal-overlay.active{display:flex;}
.modal-box{background:#fff;border-radius:16px 16px 0 0;padding:20px 16px 40px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.section-title{font-size:12px;font-weight:600;color:#6B7280;margin-bottom:8px;}
.empty{text-align:center;color:#9CA3AF;font-size:13px;padding:24px 0;}
.avatar{width:24px;height:24px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;}
h1.page-title{font-size:20px;font-weight:700;margin-bottom:4px;}
.sub{font-size:13px;color:#6B7280;}
.tiny{font-size:12px;color:#6B7280;}
.note-box{background:#F9FAFB;border-radius:6px;padding:8px;margin-top:8px;font-size:12px;color:#6B7280;line-height:1.6;}
.trip-card{background:#fff;border-radius:16px;padding:16px;border:0.5px solid #E5E7EB;margin-bottom:12px;cursor:pointer;}
.cover-box{width:52px;height:52px;border-radius:14px;background:#F3F4F6;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:12px 0;}
.stat-box{background:#F9FAFB;border-radius:8px;padding:6px 4px;text-align:center;}
.menu-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.menu-card{background:#fff;border-radius:14px;padding:14px;border:0.5px solid #E5E7EB;cursor:pointer;display:flex;flex-direction:column;gap:6px;}
.menu-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.checklist-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:0.5px solid #F3F4F6;}
.checklist-item:last-child{border-bottom:none;}
.check-circle{width:24px;height:24px;border-radius:50%;border:2px solid #D1D5DB;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.check-circle.checked{background:#1D9E75;border-color:#1D9E75;}
.check-circle.checked::after{content:'✓';color:#fff;font-size:12px;font-weight:700;}
.offline-banner{display:none;background:#FAEEDA;padding:8px 16px;font-size:12px;color:#854F0B;text-align:center;}
.offline-banner.show{display:block;}
.link-btn{color:#3B82F6;font-size:12px;text-decoration:none;word-break:break-all;}
select.input{appearance:none;}
</style>
</head>
<body>
<div class="offline-banner" id="offlineBanner">📵 オフラインです。変更は接続回復後に同期されます。</div>

<!-- TRIP LIST -->
<div class="screen active" id="screen-triplist">
  <div class="header">
    <div style="flex:1"><h1 style="font-size:18px;font-weight:700">TabiShare ✈️</h1><div class="sub">旅行一覧</div></div>
    <button class="btn-primary" onclick="showModal('newTripModal')">＋ 新しい旅行</button>
  </div>
  <div class="scroll" id="tripListContainer"></div>
</div>

<!-- TRIP DETAIL -->
<div class="screen" id="screen-trip">
  <div class="header">
    <button onclick="goBackToList()" style="background:none;border:none;cursor:pointer;font-size:20px;color:#6B7280;padding-right:8px;">🏠</button>
    <div id="tripHeaderCover" style="font-size:18px;margin-right:6px;"></div>
    <h1 id="tripHeaderName" style="font-size:15px;font-weight:600;flex:1;"></h1>
    <button onclick="openEditTripModal()" style="background:none;border:none;cursor:pointer;font-size:13px;color:#3B82F6;">編集</button>
  </div>
  <div class="scroll" id="tripDetailContent"></div>
  <nav class="bottom-nav">
    <button class="nav-btn active" onclick="switchTab('home')" id="nav-home"><span>🏠</span><small>ホーム</small></button>
    <button class="nav-btn" onclick="switchTab('booking')" id="nav-booking"><span>✈️</span><small>予約</small></button>
    <button class="nav-btn" onclick="switchTab('insurance')" id="nav-insurance"><span>🛡️</span><small>保険</small></button>
    <button class="nav-btn" onclick="switchTab('places')" id="nav-places"><span>🗺️</span><small>場所</small></button>
    <button class="nav-btn" onclick="switchTab('budget')" id="nav-budget"><span>💰</span><small>予算</small></button>
    <button class="nav-btn" onclick="switchTab('schedule')" id="nav-schedule"><span>📅</span><small>旅程</small></button>
    <button class="nav-btn" onclick="switchTab('checklist')" id="nav-checklist"><span>✅</span><small>持物</small></button>
  </nav>
</div>

<!-- MODALS -->
<div class="modal-overlay" id="newTripModal">
  <div class="modal-box">
    <div class="modal-header"><strong>新しい旅行を追加</strong><button onclick="hideModal('newTripModal')" style="background:none;border:none;font-size:20px;cursor:pointer;">✕</button></div>
    <label class="tiny">旅行名</label><input class="input" id="nt-name" placeholder="例：バリ島旅行">
    <label class="tiny">カバー絵文字</label>
    <div class="chip-row" id="coverPicker"></div>
    <input type="hidden" id="nt-cover" value="🗼">
    <label class="tiny">出発日</label><input class="input" id="nt-start" type="date">
    <label class="tiny">帰宅日</label><input class="input" id="nt-end" type="date">
    <div style="display:flex;gap:8px;margin-top:8px;">
      <button class="btn-sec" style="flex:1" onclick="hideModal('newTripModal')">キャンセル</button>
      <button class="btn-primary" style="flex:1" onclick="createTrip()">作成</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="editTripModal">
  <div class="modal-box">
    <div class="modal-header"><strong>旅行を編集</strong><button onclick="hideModal('editTripModal')" style="background:none;border:none;font-size:20px;cursor:pointer;">✕</button></div>
    <label class="tiny">旅行名</label><input class="input" id="et-name">
    <label class="tiny">カバー絵文字</label>
    <div class="chip-row" id="editCoverPicker"></div>
    <input type="hidden" id="et-cover" value="🗼">
    <label class="tiny">出発日</label><input class="input" id="et-start" type="date">
    <label class="tiny">帰宅日</label><input class="input" id="et-end" type="date">
    <div style="display:flex;gap:8px;margin-top:8px;">
      <button class="btn-sec" style="flex:1" onclick="hideModal('editTripModal')">キャンセル</button>
      <button class="btn-primary" style="flex:1" onclick="saveEditTrip()">保存</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="editFlightModal">
  <div class="modal-box">
    <div class="modal-header"><strong id="flightModalTitle">航空券を追加</strong><button onclick="hideModal('editFlightModal')" style="background:none;border:none;font-size:20px;cursor:pointer;">✕</button></div>
    <input type="hidden" id="ef-id">
    <label class="tiny">航空会社</label><input class="input" id="ef-airline" placeholder="例：JAL">
    <label class="tiny">便名</label><input class="input" id="ef-flightNo" placeholder="例：JL061">
    <label class="tiny">出発地</label><input class="input" id="ef-from" placeholder="例：東京 (HND)">
    <label class="tiny">到着地</label><input class="input" id="ef-to" placeholder="例：パリ (CDG)">
    <label class="tiny">出発日時</label><input class="input" id="ef-departure" placeholder="例：2025-09-10 11:30">
    <label class="tiny">到着日時</label><input class="input" id="ef-arrival" placeholder="例：2025-09-10 16:45">
    <label class="tiny">クラス</label><input class="input" id="ef-cls" placeholder="例：エコノミー">
    <label class="tiny">確認番号</label><input class="input" id="ef-confirmNo" placeholder="例：ABC123">
    <label class="tiny">フリーメモ</label><textarea class="input" id="ef-note" placeholder="メモ・備考など"></textarea>
    <label class="tiny">追加者</label>
    <div class="chip-row" id="ef-member-chips"></div>
    <input type="hidden" id="ef-addedBy" value="ケンケン">
    <div style="display:flex;gap:8px;margin-top:8px;">
      <button class="btn-sec" style="flex:1" onclick="hideModal('editFlightModal')">キャンセル</button>
      <button class="btn-primary" style="flex:1" onclick="saveFlight()">保存</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="editHotelModal">
  <div class="modal-box">
    <div class="modal-header"><strong id="hotelModalTitle">ホテルを追加</strong><button onclick="hideModal('editHotelModal')" style="background:none;border:none;font-size:20px;cursor:pointer;">✕</button></div>
    <input type="hidden" id="eh-id">
    <label class="tiny">ホテル名</label><input class="input" id="eh-name" placeholder="例：Hotel Le Marais">
    <label class="tiny">チェックイン</label><input class="input" id="eh-checkIn" type="date">
    <label class="tiny">チェックアウト</label><input class="input" id="eh-checkOut" type="date">
    <label class="tiny">泊数</label><input class="input" id="eh-nights" type="number" placeholder="例：7">
    <label class="tiny">確認番号</label><input class="input" id="eh-confirmNo" placeholder="例：AGO-001">
    <label class="tiny">Google Map URL</label><input class="input" id="eh-mapUrl" placeholder="https://maps.google.com/...">
    <label class="tiny">備考・キャンセル料など</label><textarea class="input" id="eh-note" placeholder="例：キャンセル料期限など"></textarea>
    <label class="tiny">フリーメモ</label><textarea class="input" id="eh-free" placeholder="自由にメモを入力"></textarea>
    <label class="tiny">追加者</label>
    <div class="chip-row" id="eh-member-chips"></div>
    <input type="hidden" id="eh-addedBy" value="ケンケン">
    <div style="display:flex;gap:8px;margin-top:8px;">
      <button class="btn-sec" style="flex:1" onclick="hideModal('editHotelModal')">キャンセル</button>
      <button class="btn-primary" style="flex:1" onclick="saveHotel()">保存</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="editInsuranceModal">
  <div class="modal-box">
    <div class="modal-header"><strong id="insModalTitle">保険を追加</strong><button onclick="hideModal('editInsuranceModal')" style="background:none;border:none;font-size:20px;cursor:pointer;">✕</button></div>
    <input type="hidden" id="ei-id">
    <label class="tiny">保険名</label><input class="input" id="ei-name" placeholder="例：楽天トラベル保険">
    <label class="tiny">保険の種類</label>
    <div class="chip-row" id="ei-type-chips"></div>
    <input type="hidden" id="ei-type" value="海外旅行保険">
    <label class="tiny">支払者</label>
    <div class="chip-row" id="ei-member-chips"></div>
    <input type="hidden" id="ei-paidBy" value="ケンケン">
    <label class="tiny">保険料金</label><input class="input" id="ei-amount" placeholder="例：¥12,400" type="number">
    <label class="tiny">支払日</label><input class="input" id="ei-date" type="date">
    <label class="tiny">証券番号</label><input class="input" id="ei-no" placeholder="例：RTI-20250715-001">
    <label class="tiny">補償内容・メモ</label><textarea class="input" id="ei-note" placeholder="補償内容や連絡先など自由に"></textarea>
    <label class="tiny">PDFファイル名（添付メモ）</label><input class="input" id="ei-pdf" placeholder="例：楽天保険証書.pdf（ファイル名のみ記録）">
    <div style="display:flex;gap:8px;margin-top:8px;">
      <button class="btn-sec" style="flex:1" onclick="hideModal('editInsuranceModal')">キャンセル</button>
      <button class="btn-primary" style="flex:1" onclick="saveInsurance()">保存</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="addPlaceModal">
  <div class="modal-box">
    <div class="modal-header"><strong id="placeModalTitle">場所を追加</strong><button onclick="hideModal('addPlaceModal')" style="background:none;border:none;font-size:20px;cursor:pointer;">✕</button></div>
    <input type="hidden" id="ap-id">
    <input class="input" id="ap-name" placeholder="場所の名前">
    <label class="tiny">カテゴリ</label>
    <div class="chip-row" id="ap-cat-chips"></div>
    <input type="hidden" id="ap-cat" value="観光">
    <label class="tiny">優先度</label>
    <div class="chip-row" id="ap-prio-chips"></div>
    <input type="hidden" id="ap-prio" value="絶対行く">
    <label class="tiny">追加者</label>
    <div class="chip-row" id="ap-member-chips"></div>
    <input type="hidden" id="ap-addedBy" value="ケンケン">
    <label class="tiny">フリーコメント</label><textarea class="input" id="ap-memo" placeholder="メモ・感想など自由に"></textarea>
    <label class="tiny">Google Map URL</label><input class="input" id="ap-mapUrl" placeholder="https://maps.google.com/...">
    <label class="tiny">参考URL</label><input class="input" id="ap-infoUrl" placeholder="https://...">
    <div style="display:flex;gap:8px;">
      <button class="btn-sec" style="flex:1" onclick="hideModal('addPlaceModal')">キャンセル</button>
      <button class="btn-primary" style="flex:1" onclick="savePlace()">保存</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="budgetDetailModal">
  <div class="modal-box">
    <div class="modal-header"><strong id="bdCatTitle"></strong><button onclick="hideModal('budgetDetailModal')" style="background:none;border:none;font-size:20px;cursor:pointer;">✕</button></div>
    <div id="budgetDetailContent"></div>
  </div>
</div>

<div class="modal-overlay" id="editScheduleModal">
  <div class="modal-box">
    <div class="modal-header"><strong id="scheduleModalTitle">予定を追加</strong><button onclick="hideModal('editScheduleModal')" style="background:none;border:none;font-size:20px;cursor:pointer;">✕</button></div>
    <input type="hidden" id="as-id">
    <label class="tiny">日程</label>
    <select class="input" id="as-day"></select>
    <label class="tiny">開始時刻（任意）</label><input class="input" id="as-time" placeholder="例：09:00">
    <label class="tiny">終了時刻（任意）</label><input class="input" id="as-endtime" placeholder="例：11:00">
    <label class="tiny">カテゴリ</label>
    <div class="chip-row" id="as-cat-chips"></div>
    <input type="hidden" id="as-cat" value="観光">
    <input class="input" id="as-title" placeholder="タイトル">
    <textarea class="input" id="as-memo" placeholder="メモ（任意）"></textarea>
    <label class="tiny">メンバー</label>
    <div class="chip-row" id="as-member-chips"></div>
    <input type="hidden" id="as-member" value="両方">
    <div style="display:flex;gap:8px;margin-top:8px;">
      <button class="btn-sec" style="flex:1" onclick="hideModal('editScheduleModal')">キャンセル</button>
      <button class="btn-primary" style="flex:1" onclick="saveSchedule()">保存</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="editCheckModal">
  <div class="modal-box">
    <div class="modal-header"><strong id="checkModalTitle">持ち物を追加</strong><button onclick="hideModal('editCheckModal')" style="background:none;border:none;font-size:20px;cursor:pointer;">✕</button></div>
    <input type="hidden" id="ack-id">
    <input class="input" id="ack-name" placeholder="例：パスポート">
    <label class="tiny">カテゴリ</label>
    <div class="chip-row" id="ack-cat-chips"></div>
    <input type="hidden" id="ack-cat" value="書類">
    <label class="tiny">新しいカテゴリを追加</label>
    <div style="display:flex;gap:8px;margin-bottom:10px;">
      <input class="input" style="flex:1;margin-bottom:0" id="ack-new-cat" placeholder="例：スポーツ用品">
      <button class="btn-primary" onclick="addCustomCheckCat()">追加</button>
    </div>
    <label class="tiny">担当者</label>
    <div class="chip-row" id="ack-member-chips"></div>
    <input type="hidden" id="ack-member" value="両方">
    <div style="display:flex;gap:8px;margin-top:8px;">
      <button class="btn-sec" style="flex:1" onclick="hideModal('editCheckModal')">キャンセル</button>
      <button class="btn-primary" style="flex:1" onclick="saveCheckItem()">保存</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="addExpModal">
  <div class="modal-box">
    <div class="modal-header"><strong id="addExpTitle">支出を追加</strong><button onclick="hideModal('addExpModal')" style="background:none;border:none;font-size:20px;cursor:pointer;">✕</button></div>
    <input type="hidden" id="ae-cat">
    <input class="input" id="ae-desc" placeholder="内容（例：ディナー）">
    <label class="tiny">金額（円）</label><input class="input" id="ae-amount" type="number" placeholder="例：5000">
    <label class="tiny">支払者</label>
    <div class="chip-row" id="ae-member-chips"></div>
    <input type="hidden" id="ae-paidBy" value="ケンケン">
    <input class="input" id="ae-date" type="date">
    <div style="display:flex;gap:8px;margin-top:8px;">
      <button class="btn-sec" style="flex:1" onclick="hideModal('addExpModal')">キャンセル</button>
      <button class="btn-primary" style="flex:1" onclick="saveExpense()">追加</button>
    </div>
  </div>
</div>

<script type="module">

// ── constants ──

const CATS = ['交通','食事','観光','ホテル','ショッピング','その他'];
const CAT_ICON = {'交通':'🚆','食事':'🍽️','観光':'🏛️','ホテル':'🏨','ショッピング':'🛍️','その他':'📌'};
const CAT_BG = {'交通':'#EEEDFE','食事':'#E1F5EE','観光':'#E6F1FB','ホテル':'#FAEEDA','ショッピング':'#FAECE7','その他':'#F1EFE8'};
const CAT_COLOR = {'交通':'#3C3489','食事':'#085041','観光':'#0C447C','ホテル':'#854F0B','ショッピング':'#993C1D','その他':'#5F5E5A'};
const MEMBER_BG = {'ケンケン':'#EEEDFE','あき':'#FAECE7','両方':'#E1F5EE'};
const MEMBER_COLOR = {'ケンケン':'#3C3489','あき':'#993C1D','両方':'#085041'};
const CHECK_CATS = ['書類','衣類','電子機器','衛生用品','薬','その他'];
const CHECK_CAT_ICON = {'書類':'📄','衣類':'👕','電子機器':'📱','衛生用品':'🧴','薬':'💊','その他':'🎒'};
const INS_TYPES = ['海外旅行保険','キャンセル保険','航空保険','その他'];

// ── state ──
window.trips = [];
window.activeTrip = null;
window.activeTab = 'home';
window.activeDay = 0;
window.placesFilter = 'すべて';
window.checkFilter = 'すべて';
window.isOnline = navigator.onLine;
window.offlineQueue = JSON.parse(localStorage.getItem('offlineQueue')||'[]');

window.addEventListener('online',()=>{window.isOnline=true;document.getElementById('offlineBanner').classList.remove('show');flushQueue();});
window.addEventListener('offline',()=>{window.isOnline=false;document.getElementById('offlineBanner').classList.add('show');});
if(!navigator.onLine) document.getElementById('offlineBanner').classList.add('show');

async function flushQueue(){
  const q=[...window.offlineQueue];window.offlineQueue=[];localStorage.removeItem('offlineQueue');
  for(const item of q){try{await setDoc(doc(db,'trips',item.id),item);}catch(e){}}
}

onSnapshot(collection(db,'trips'),snapshot=>{
  if(!snapshot.empty){window.trips=snapshot.docs.map(d=>({...d.data(),id:d.id}));}
  renderTripList();
  if(window.activeTrip){
    const updated=window.trips.find(t=>t.id===window.activeTrip.id);
    if(updated){window.activeTrip=updated;renderTab(window.activeTab);}
  }
});

async function saveTrip(trip){
  if(window.isOnline){try{await setDoc(doc(db,'trips',trip.id),trip);}catch(e){queueSave(trip);}}
  else{queueSave(trip);}
}
async function removeTrip(id){
  window.trips=window.trips.filter(t=>t.id!==id);
  renderTripList();
  if(window.isOnline){try{await deleteDoc(doc(db,'trips',id));}catch(e){}}
}
function queueSave(trip){
  window.offlineQueue=window.offlineQueue.filter(q=>q.id!==trip.id);
  window.offlineQueue.push(trip);
  localStorage.setItem('offlineQueue',JSON.stringify(window.offlineQueue));
}
function updateTrip(data){
  const updated={...window.activeTrip,...data};
  window.activeTrip=updated;
  window.trips=window.trips.map(t=>t.id===updated.id?updated:t);
  saveTrip(updated);
  renderTab(window.activeTab);
}

// ── helpers ──
function fmt(n){return '¥'+Math.round(n||0).toLocaleString();}
function daysUntil(d){return Math.ceil((new Date(d)-new Date())/86400000);}
function tripStatus(t){
  const s=daysUntil(t.startDate),e=daysUntil(t.endDate);
  if(s>0)return{label:'あと'+s+'日',bg:'#EEEDFE',color:'#3C3489'};
  if(e>=0)return{label:'旅行中！',bg:'#E1F5EE',color:'#085041'};
  return{label:'終了',bg:'#F1EFE8',color:'#5F5E5A'};
}
function totalNights(t){return (t.hotels||[]).reduce((a,h)=>a+(parseInt(h.nights)||0),0);}
function avatar(name,size=24){
  return `<div class="avatar" style="width:${size}px;height:${size}px;background:${MEMBER_BG[name]||'#F1EFE8'};color:${MEMBER_COLOR[name]||'#5F5E5A'};font-size:${size*0.38}px">${name==='両方'?'両':name[0]}</div>`;
}
function badge(label,bg,color){return `<span class="badge" style="background:${bg};color:${color}">${label}</span>`;}
function progBar(pct){const c=pct>100?'#E24B4A':pct>80?'#EF9F27':'#1D9E75';return `<div class="prog-bar"><div class="prog-fill" style="width:${Math.min(pct,100)}%;background:${c}"></div></div>`;}
function getCheckCats(){return [...CHECK_CATS,...(window.activeTrip?.customCheckCats||[]).filter(c=>!CHECK_CATS.includes(c))];}
function getCheckCatIcon(cat){return CHECK_CAT_ICON[cat]||'📦';}
function escJ(obj){return JSON.stringify(obj).replace(/'/g,"&#39;").replace(/"/g,'&quot;');}

window.selectChip=function(inputId,val,el){
  document.getElementById(inputId).value=val;
  el.closest('.chip-row').querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
};
window.showModal=function(id){document.getElementById(id).classList.add('active');};
window.hideModal=function(id){document.getElementById(id).classList.remove('active');};

// ── TRIP LIST ──
function renderTripList(){
  const cp=document.getElementById('coverPicker');
  if(cp) cp.innerHTML=COVERS.map(c=>`<button class="chip${c==='🗼'?' active':''}" onclick="selectChip('nt-cover','${c}',this)">${c}</button>`).join('');
  const cont=document.getElementById('tripListContainer');
  if(!window.trips.length){
    cont.innerHTML=`<div style="text-align:center;padding:60px 0"><div style="font-size:40px;margin-bottom:12px">🌍</div><p class="sub" style="margin-bottom:16px">旅行がまだありません</p><button class="btn-primary" onclick="showModal('newTripModal')">＋ 最初の旅行を追加</button></div>`;
    return;
  }
  cont.innerHTML=window.trips.map(t=>{
    const st=tripStatus(t);
    const totalB=(t.budgets||[]).reduce((a,b)=>a+(b.budgetJPY||0),0);
    const totalS=(t.expenses||[]).reduce((a,e)=>a+(e.amountJPY||0),0);
    const pct=totalB>0?Math.round((totalS/totalB)*100):0;
    const nights=totalNights(t);
    return `<div class="trip-card" onclick="openTrip('${t.id}')">
      <div style="display:flex;align-items:flex-start;gap:12px;margin-bottom:12px">
        <div class="cover-box">${t.cover}</div>
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px">
            <strong style="font-size:17px">${t.name}</strong>
            <span class="badge" style="background:${st.bg};color:${st.color}">${st.label}</span>
          </div>
          <div class="sub">${t.startDate} 〜 ${t.endDate}</div>
          <div style="display:flex;gap:4px;margin-top:4px">${(t.members||[]).map(m=>avatar(m,20)).join('')}</div>
        </div>
        <button onclick="event.stopPropagation();deleteTripById('${t.id}')" style="background:none;border:none;font-size:18px;color:#9CA3AF;cursor:pointer;padding:4px">✕</button>
      </div>
      <div class="stats-grid">
        <div class="stat-box"><div style="font-size:13px">✈️</div><div class="tiny">${(t.flights||[]).length}便</div></div>
        <div class="stat-box"><div style="font-size:13px">🏨</div><div class="tiny">${nights}泊</div></div>
        <div class="stat-box"><div style="font-size:13px">🗺️</div><div class="tiny">${(t.places||[]).length}件</div></div>
        <div class="stat-box"><div style="font-size:13px">✅</div><div class="tiny">${(t.checklist||[]).filter(c=>c.checked).length}/${(t.checklist||[]).length}</div></div>
      </div>
      ${totalB>0?`<div style="display:flex;justify-content:space-between"><span class="tiny">予算消化率 ${pct}%</span><span class="tiny">${fmt(totalS)} / ${fmt(totalB)}</span></div>${progBar(pct)}`:''}
    </div>`;
  }).join('');
}

window.deleteTripById=async function(id){if(!confirm('この旅行を削除しますか？'))return;await removeTrip(id);};
window.openTrip=function(id){
  window.activeTrip=window.trips.find(t=>t.id===id);
  window.activeDay=0;window.placesFilter='すべて';window.checkFilter='すべて';
  document.getElementById('screen-triplist').classList.remove('active');
  document.getElementById('screen-trip').classList.add('active');
  document.getElementById('tripHeaderName').textContent=window.activeTrip.name;
  document.getElementById('tripHeaderCover').textContent=window.activeTrip.cover;
  switchTab('home');
};
window.goBackToList=function(){
  document.getElementById('screen-trip').classList.remove('active');
  document.getElementById('screen-triplist').classList.add('active');
  window.activeTrip=null;renderTripList();
};
window.createTrip=function(){
  const name=document.getElementById('nt-name').value.trim();
  const cover=document.getElementById('nt-cover').value;
  const start=document.getElementById('nt-start').value;
  const end=document.getElementById('nt-end').value;
  if(!name||!start||!end){alert('旅行名・出発日・帰宅日を入力してください');return;}
  const days=[];const d=new Date(start),ed=new Date(end);const DOW=['日','月','火','水','木','金','土'];
  while(d<=ed){days.push({date:(d.getMonth()+1)+'/'+(d.getDate())+'('+DOW[d.getDay()]+')',label:''});d.setDate(d.getDate()+1);}
  const trip={id:'trip'+Date.now(),name,cover,startDate:start,endDate:end,members:['ケンケン','あき'],flights:[],hotels:[],insurance:[],places:[],expenses:[],budgets:CATS.map(cat=>({cat,budgetJPY:0,note:''})),schedule:[],checklist:[],customCheckCats:[],days};
  saveTrip(trip);window.trips.push(trip);renderTripList();hideModal('newTripModal');
  ['nt-name','nt-start','nt-end'].forEach(id=>document.getElementById(id).value='');
};
window.openEditTripModal=function(){
  const t=window.activeTrip;
  document.getElementById('et-name').value=t.name;
  document.getElementById('et-cover').value=t.cover;
  document.getElementById('et-start').value=t.startDate;
  document.getElementById('et-end').value=t.endDate;
  document.getElementById('editCoverPicker').innerHTML=COVERS.map(c=>`<button class="chip${c===t.cover?' active':''}" onclick="selectChip('et-cover','${c}',this)">${c}</button>`).join('');
  showModal('editTripModal');
};
window.saveEditTrip=function(){
  const name=document.getElementById('et-name').value.trim();
  const cover=document.getElementById('et-cover').value;
  const start=document.getElementById('et-start').value;
  const end=document.getElementById('et-end').value;
  if(!name||!start||!end){alert('必須項目を入力してください');return;}
  const days=[];const d=new Date(start),ed=new Date(end);const DOW=['日','月','火','水','木','金','土'];
  while(d<=ed){days.push({date:(d.getMonth()+1)+'/'+(d.getDate())+'('+DOW[d.getDay()]+')',label:''});d.setDate(d.getDate()+1);}
  updateTrip({name,cover,startDate:start,endDate:end,days});
  document.getElementById('tripHeaderName').textContent=name;
  document.getElementById('tripHeaderCover').textContent=cover;
  hideModal('editTripModal');
};

// ── TAB ──
window.switchTab=function(tab){
  window.activeTab=tab;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const nb=document.getElementById('nav-'+tab);if(nb)nb.classList.add('active');
  renderTab(tab);
};
function renderTab(tab){
  const c=document.getElementById('tripDetailContent');
  const t=window.activeTrip;if(!t)return;
  if(tab==='home')c.innerHTML=renderHome(t);
  else if(tab==='booking')c.innerHTML=renderBooking(t);
  else if(tab==='insurance')c.innerHTML=renderInsurance(t);
  else if(tab==='places')c.innerHTML=renderPlaces(t);
  else if(tab==='budget')c.innerHTML=renderBudget(t);
  else if(tab==='schedule')c.innerHTML=renderSchedule(t);
  else if(tab==='checklist')c.innerHTML=renderChecklist(t);
}

// ── HOME ──
function renderHome(t){
  const st=tripStatus(t);
  const totalB=(t.budgets||[]).reduce((a,b)=>a+(b.budgetJPY||0),0);
  const totalS=(t.expenses||[]).reduce((a,e)=>a+(e.amountJPY||0),0);
  const pct=totalB>0?Math.round((totalS/totalB)*100):0;
  const checked=(t.checklist||[]).filter(c=>c.checked).length;
  const total=(t.checklist||[]).length;
  const nights=totalNights(t);
  return `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
      <div class="cover-box" style="width:56px;height:56px;font-size:28px">${t.cover}</div>
      <div>
        <div style="font-size:20px;font-weight:700">${t.name}</div>
        <div class="sub">${t.startDate} 〜 ${t.endDate}</div>
        <span class="badge" style="background:${st.bg};color:${st.color};margin-top:4px;display:inline-block">${st.label}</span>
      </div>
    </div>
    <div class="card" style="margin-bottom:16px">
      <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap">
        ${(t.members||[]).map(m=>`<div style="display:flex;align-items:center;gap:6px;background:#F9FAFB;border-radius:20px;padding:4px 10px 4px 6px">${avatar(m,24)}<span style="font-size:13px;font-weight:500">${m}</span></div>`).join('')}
        <span class="tiny" style="align-self:center">共同編集中</span>
      </div>
      ${totalB>0?`<div style="display:flex;justify-content:space-between"><span class="tiny">予算消化率 ${pct}%</span><span class="tiny">${fmt(totalS)} / ${fmt(totalB)}</span></div>${progBar(pct)}`:''}
    </div>
    <div class="menu-grid">
      <div class="menu-card" onclick="switchTab('booking')"><div class="menu-icon" style="background:#EEEDFE">✈️</div><strong style="font-size:13px">予約情報</strong><span style="font-size:11px;color:#3C3489">${(t.flights||[]).length}便 · ${nights}泊</span></div>
      <div class="menu-card" onclick="switchTab('insurance')"><div class="menu-icon" style="background:#E1F5EE">🛡️</div><strong style="font-size:13px">保険</strong><span style="font-size:11px;color:#085041">${(t.insurance||[]).length}件</span></div>
      <div class="menu-card" onclick="switchTab('places')"><div class="menu-icon" style="background:#E6F1FB">🗺️</div><strong style="font-size:13px">行きたい場所</strong><span style="font-size:11px;color:#0C447C">${(t.places||[]).length}件</span></div>
      <div class="menu-card" onclick="switchTab('budget')"><div class="menu-icon" style="background:#FAEEDA">💰</div><strong style="font-size:13px">予算・支出</strong><span style="font-size:11px;color:#854F0B">消化率 ${pct}%</span></div>
      <div class="menu-card" onclick="switchTab('schedule')"><div class="menu-icon" style="background:#E6F1FB">📅</div><strong style="font-size:13px">スケジュール</strong><span style="font-size:11px;color:#0C447C">${(t.days||[]).length}日間</span></div>
      <div class="menu-card" onclick="switchTab('checklist')"><div class="menu-icon" style="background:#E1F5EE">✅</div><strong style="font-size:13px">持ち物リスト</strong><span style="font-size:11px;color:#085041">${checked}/${total} 完了</span></div>
    </div>`;
}

  const id=document.getElementById('ef-id').value;

window.saveHotel=function(){

// ── BUDGET ──
function renderBudget(t){
  const totalB=(t.budgets||[]).reduce((a,b)=>a+(b.budgetJPY||0),0);
  const totalS=(t.expenses||[]).reduce((a,e)=>a+(e.amountJPY||0),0);
  const memberData=(t.members||[]).map(m=>({name:m,total:(t.expenses||[]).filter(e=>e.paidBy===m).reduce((a,e)=>a+e.amountJPY,0)}));
  return `
    <h1 class="page-title">予算・支出管理</h1>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0">
      ${[['総予算',fmt(totalB)],['総支出',fmt(totalS)],['残り',fmt(totalB-totalS)]].map(([l,v])=>`<div style="background:#F9FAFB;border-radius:10px;padding:10px"><div class="tiny">${l}</div><strong style="font-size:14px">${v}</strong></div>`).join('')}
    </div>
    <div class="section-title" style="margin-bottom:10px">カテゴリ別（タップで詳細・編集）</div>
    ${CATS.map(cat=>{
      const b=(t.budgets||[]).find(b=>b.cat===cat)||{};
      const spent=(t.expenses||[]).filter(e=>e.cat===cat).reduce((a,e)=>a+e.amountJPY,0);
      const budget=b.budgetJPY||0;const pct=budget>0?(spent/budget)*100:0;
      return `<div class="card" style="cursor:pointer" onclick="openBudgetDetail('${cat}')">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <div style="display:flex;align-items:center;gap:6px">${CAT_ICON[cat]} <strong>${cat}</strong></div>
          <span style="font-size:12px;color:#3B82F6">詳細 →</span>
        </div>
        <div style="display:flex;justify-content:space-between">
          <span class="tiny">支出: <strong style="color:#111">${fmt(spent)}</strong></span>
          <span class="tiny">${budget>0?'予算: '+fmt(budget):'未設定'}</span>
        </div>
        ${budget>0?progBar(pct):''}
        ${b.note?`<div class="note-box">📋 ${b.note}</div>`:''}
      </div>`;
    }).join('')}
    <div class="section-title" style="margin:16px 0 10px">メンバー別</div>
    ${memberData.map(({name,total})=>`
      <div class="card" style="margin-bottom:10px">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">${avatar(name,34)}<div><strong style="font-size:15px">${name}</strong><div class="tiny">合計: <strong>${fmt(total)}</strong></div></div></div>
        ${CATS.map(cat=>{const items=(t.expenses||[]).filter(e=>e.paidBy===name&&e.cat===cat);if(!items.length)return'';const sub=items.reduce((a,e)=>a+e.amountJPY,0);return`<div style="display:flex;justify-content:space-between;margin-bottom:2px"><span class="tiny">${CAT_ICON[cat]} ${cat}</span><span class="tiny">${fmt(sub)}</span></div>`;}).join('')}
      </div>`).join('')}
    ${(()=>{if(memberData.length<2)return'';const[a,b]=memberData;const diff=Math.abs(a.total-b.total)/2;const payer=a.total>b.total?b.name:a.name;const recv=a.total>b.total?a.name:b.name;return diff>0?`<div class="card" style="background:#F9FAFB"><div class="tiny">精算</div><div style="font-size:14px;margin-top:4px"><strong>${payer}</strong> → <strong>${recv}</strong> に <strong>${fmt(diff)}</strong></div></div>`:'';})()}`;
}

  const daySelect=document.getElementById('as-day');
  daySelect.innerHTML=(t.days||[]).map((d,i)=>`<option value="${i}" ${i===window.activeDay?'selected':''}>${d.date} ${d.label}</option>`).join('');
  document.getElementById('as-cat-chips').innerHTML=CATS.map(c=>`<button class="chip${document.getElementById('as-cat').value===c?' active':''}" onclick="selectChip('as-cat','${c}',this)">${CAT_ICON[c]} ${c}</button>`).join('');
  document.getElementById('as-member-chips').innerHTML=[...MEMBERS,'両方'].map(m=>`<button class="chip${document.getElementById('as-member').value===m?' active':''}" onclick="selectChip('as-member','${m}',this)">${m}</button>`).join('');
}

window.openScheduleModal=function(){
  document.getElementById('scheduleModalTitle').textContent='予定を追加';
  document.getElementById('as-id').value='';
  ['as-time','as-endtime','as-title','as-memo'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('as-cat').value='観光';document.getElementById('as-member').value='両方';
  populateScheduleModal();
  showModal('editScheduleModal');
};

window.editScheduleItem=function(ev){
  document.getElementById('scheduleModalTitle').textContent='予定を編集';
  document.getElementById('as-id').value=ev.id;
  document.getElementById('as-time').value=ev.time||'';
  document.getElementById('as-endtime').value=ev.endtime||'';
  document.getElementById('as-title').value=ev.title||'';
  document.getElementById('as-memo').value=ev.memo||'';
  document.getElementById('as-cat').value=ev.cat||'観光';
  document.getElementById('as-member').value=ev.member||'両方';
  populateScheduleModal();
  // set correct day
  document.getElementById('as-day').value=ev.day;
  showModal('editScheduleModal');
};

window.saveSchedule=function(){
  const title=document.getElementById('as-title').value.trim();if(!title)return;
  const id=document.getElementById('as-id').value;
  const dayIdx=parseInt(document.getElementById('as-day').value);
  const ev={id:id?parseInt(id):Date.now(),day:dayIdx,time:document.getElementById('as-time').value,endtime:document.getElementById('as-endtime').value,cat:document.getElementById('as-cat').value,title,memo:document.getElementById('as-memo').value,member:document.getElementById('as-member').value};
  const schedule=id?(window.activeTrip.schedule||[]).map(e=>e.id==id?ev:e):[...(window.activeTrip.schedule||[]),ev];
  window.activeDay=dayIdx;
  updateTrip({schedule});hideModal('editScheduleModal');
};
window.deleteSchedule=function(id){updateTrip({schedule:(window.activeTrip.schedule||[]).filter(e=>e.id!==id)});};

// ── CHECKLIST ──
function renderChecklist(t){
  const allCats=getCheckCats();
  const items=t.checklist||[];
  const f=window.checkFilter;
  let filtered;
  if(f==='すべて')filtered=items;
  else if(f==='未完了')filtered=items.filter(i=>!i.checked);
  else if(f==='完了')filtered=items.filter(i=>i.checked);
  else filtered=items.filter(i=>i.cat===f);
  const checked=items.filter(i=>i.checked).length;
  const pct=items.length?Math.round((checked/items.length)*100):0;

  // which cats have items in filtered
  const activeCats=allCats.filter(cat=>filtered.some(i=>i.cat===cat));

  return `
    <div class="row"><div><h1 class="page-title">持ち物リスト</h1><div class="sub">${checked}/${items.length} 完了</div></div><button class="btn-primary" onclick="openCheckModal()">＋ 追加</button></div>
    <div class="card" style="margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px"><span class="tiny">準備完了 ${pct}%</span><span class="tiny">${checked}/${items.length}個</span></div>
      ${progBar(pct)}
    </div>
    <div class="chip-row">
      ${['すべて','未完了','完了',...allCats].map(c=>`<button class="chip${f===c?' active':''}" onclick="setCheckFilter('${c}')">${getCheckCatIcon(c)} ${c}</button>`).join('')}
    </div>
    ${activeCats.length?activeCats.map(cat=>{
      const catItems=filtered.filter(i=>i.cat===cat);
      return `<div style="margin-bottom:16px">
        <div class="section-title">${getCheckCatIcon(cat)} ${cat}</div>
        <div class="card">
          ${catItems.map(item=>`<div class="checklist-item">
            <div class="check-circle${item.checked?' checked':''}" onclick="toggleCheck(${item.id})"></div>
            <div style="flex:1">
              <div style="font-size:14px;${item.checked?'text-decoration:line-through;color:#9CA3AF':'color:#111'}">${item.name}</div>
              <div style="display:flex;align-items:center;gap:4px;margin-top:2px">${avatar(item.member,16)}<span class="tiny">${item.member}</span></div>
            </div>
            <div style="display:flex;gap:4px">
              <button class="btn-edit" style="font-size:10px;padding:2px 7px" onclick='editCheckItem(${escJ(item)})'>編集</button>
              <button style="background:none;border:none;cursor:pointer;color:#EF4444;font-size:16px;line-height:1" onclick="deleteCheck(${item.id})">✕</button>
            </div>
          </div>`).join('')}
        </div>
      </div>`;
    }).join(''):'<div class="empty">持ち物がまだありません</div>'}
    ${items.length>0?`<button class="btn-danger" style="width:100%;margin-top:8px" onclick="resetChecklist()">✓ チェックをリセット</button>`:''}`;
}

window.setCheckFilter=function(f){window.checkFilter=f;renderTab('checklist');};

window.openCheckModal=function(){
  document.getElementById('checkModalTitle').textContent='持ち物を追加';
  document.getElementById('ack-id').value='';document.getElementById('ack-name').value='';
  document.getElementById('ack-cat').value='書類';document.getElementById('ack-member').value='両方';
  renderCheckCatChips('書類');
  document.getElementById('ack-member-chips').innerHTML=[...MEMBERS,'両方'].map(m=>`<button class="chip${m==='両方'?' active':''}" onclick="selectChip('ack-member','${m}',this)">${m}</button>`).join('');
  showModal('editCheckModal');
};
window.editCheckItem=function(item){
  document.getElementById('checkModalTitle').textContent='持ち物を編集';
  document.getElementById('ack-id').value=item.id;
  document.getElementById('ack-name').value=item.name||'';
  document.getElementById('ack-cat').value=item.cat||'書類';
  document.getElementById('ack-member').value=item.member||'両方';
  renderCheckCatChips(item.cat||'書類');
  document.getElementById('ack-member-chips').innerHTML=[...MEMBERS,'両方'].map(m=>`<button class="chip${m===(item.member||'両方')?' active':''}" onclick="selectChip('ack-member','${m}',this)">${m}</button>`).join('');
  showModal('editCheckModal');
};
function renderCheckCatChips(selected){
  document.getElementById('ack-cat-chips').innerHTML=getCheckCats().map(c=>`<button class="chip${c===selected?' active':''}" onclick="selectChip('ack-cat','${c}',this)">${getCheckCatIcon(c)} ${c}</button>`).join('');
}
window.addCustomCheckCat=function(){
  const val=document.getElementById('ack-new-cat').value.trim();if(!val)return;
  const custom=[...(window.activeTrip.customCheckCats||[])];
  if(!custom.includes(val)&&!CHECK_CATS.includes(val)){custom.push(val);updateTrip({customCheckCats:custom});}
  document.getElementById('ack-new-cat').value='';
  renderCheckCatChips(val);document.getElementById('ack-cat').value=val;
};
window.saveCheckItem=function(){
  const id=document.getElementById('ack-id').value;
  const name=document.getElementById('ack-name').value.trim();if(!name)return;
  const item={id:id?parseInt(id):Date.now(),name,cat:document.getElementById('ack-cat').value,member:document.getElementById('ack-member').value,checked:false};
  const existing=(window.activeTrip.checklist||[]).find(i=>i.id==id);
  if(existing)item.checked=existing.checked;
  const checklist=id?(window.activeTrip.checklist||[]).map(i=>i.id==id?item:i):[...(window.activeTrip.checklist||[]),item];
  updateTrip({checklist});hideModal('editCheckModal');
};
window.toggleCheck=function(id){
  updateTrip({checklist:(window.activeTrip.checklist||[]).map(i=>i.id===id?{...i,checked:!i.checked}:i)});
};
window.deleteCheck=function(id){
  updateTrip({checklist:(window.activeTrip.checklist||[]).filter(i=>i.id!==id)});
};
window.resetChecklist=function(){
  if(!confirm('全てのチェックをリセットしますか？'))return;
  const checklist=(window.activeTrip.checklist||[]).map(i=>({...i,checked:false}));
  updateTrip({checklist});
};

renderTripList();
</script>
